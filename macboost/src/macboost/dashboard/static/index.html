<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBoost — Dashboard</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card-hover: #1f1f3a;
            --accent: #00d4ff;
            --accent2: #0099ff;
            --green: #00e676;
            --yellow: #ffab00;
            --red: #ff5252;
            --text: #e0e0e0;
            --dim: #666;
            --border: #2a2a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 24px; color: var(--accent); }
        .header h1 span { color: var(--text); font-weight: 300; }
        .score-badge {
            font-size: 32px;
            font-weight: 700;
            padding: 8px 24px;
            border-radius: 16px;
            background: var(--card);
            border: 2px solid var(--accent);
        }
        .main { padding: 24px 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--accent); }
        .card h3 { color: var(--accent); margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .metric-sub { color: var(--dim); font-size: 13px; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 12px 0; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .fill-green { background: linear-gradient(90deg, var(--green), #00c853); }
        .fill-yellow { background: linear-gradient(90deg, var(--yellow), #ff8f00); }
        .fill-red { background: linear-gradient(90deg, var(--red), #d50000); }
        .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .btn {
            padding: 14px 24px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover { border-color: var(--accent); background: var(--card-hover); }
        .btn:active { transform: scale(0.98); }
        .btn.primary { background: var(--accent); color: #000; font-weight: 600; border-color: var(--accent); }
        .btn.primary:hover { background: var(--accent2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .chart-container { height: 200px; position: relative; }
        .section-title { font-size: 18px; font-weight: 600; margin: 32px 0 16px; color: var(--text); }
        .log { background: var(--card); border-radius: 12px; padding: 16px; max-height: 300px; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 13px; }
        .log-entry { padding: 6px 0; border-bottom: 1px solid #1a1a2a; color: var(--dim); }
        .log-entry.success { color: var(--green); }
        .log-entry.error { color: var(--red); }
        .log-entry.info { color: var(--accent); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-green { background: var(--green); }
        .dot-yellow { background: var(--yellow); }
        .dot-red { background: var(--red); }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .module-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .module-card h4 { margin-bottom: 8px; }
        .module-status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .issue { padding: 8px 12px; margin: 4px 0; background: #111; border-radius: 8px; font-size: 13px; }
        .toast {
            position: fixed; bottom: 24px; right: 24px; padding: 16px 24px;
            background: var(--card); border: 1px solid var(--accent); border-radius: 12px;
            font-size: 14px; z-index: 1000; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .connected { color: var(--green); }
        .disconnected { color: var(--red); }
    </style>
</head>
<body x-data="dashboard()" x-init="init()">

    <!-- Header -->
    <div class="header">
        <div>
            <h1>⚡ MacBoost <span>Dashboard</span></h1>
            <small :class="wsConnected ? 'connected' : 'disconnected'" x-text="wsConnected ? '● Conectado — tiempo real' : '○ Desconectado'"></small>
        </div>
        <div class="score-badge" :style="`color: ${scoreColor}`" x-text="score"></div>
    </div>

    <div class="main">
        <!-- Métricas en tiempo real -->
        <div class="grid">
            <!-- CPU -->
            <div class="card">
                <h3>CPU</h3>
                <div class="metric-value" x-text="metrics.cpu.percent + '%'">--</div>
                <div class="progress-bar">
                    <div class="progress-fill" :class="barClass(metrics.cpu.percent)" :style="`width: ${metrics.cpu.percent}%`"></div>
                </div>
                <div class="metric-sub" x-text="`${(metrics.cpu.per_core || []).length} cores`"></div>
            </div>

            <!-- RAM -->
            <div class="card">
                <h3>RAM</h3>
                <div class="metric-value" x-text="metrics.ram.percent + '%'">--</div>
                <div class="progress-bar">
                    <div class="progress-fill" :class="barClass(metrics.ram.percent)" :style="`width: ${metrics.ram.percent}%`"></div>
                </div>
                <div class="metric-sub" x-text="`${metrics.ram.used_gb} GB / ${metrics.ram.total_gb} GB`"></div>
            </div>

            <!-- SSD -->
            <div class="card">
                <h3>SSD</h3>
                <div class="metric-value" x-text="metrics.ssd.percent + '%'">--</div>
                <div class="progress-bar">
                    <div class="progress-fill" :class="barClass(metrics.ssd.percent)" :style="`width: ${metrics.ssd.percent}%`"></div>
                </div>
                <div class="metric-sub" x-text="`${metrics.ssd.free_gb} GB libres de ${metrics.ssd.total_gb} GB`"></div>
            </div>

            <!-- Battery -->
            <div class="card">
                <h3>Batería</h3>
                <template x-if="metrics.battery.percent !== null">
                    <div>
                        <div class="metric-value" x-text="metrics.battery.percent + '%'"></div>
                        <div class="progress-bar">
                            <div class="progress-fill fill-green" :style="`width: ${metrics.battery.percent}%`"></div>
                        </div>
                        <div class="metric-sub" x-text="metrics.battery.plugged ? '⚡ Cargando' : '🔋 Batería'"></div>
                    </div>
                </template>
                <template x-if="metrics.battery.percent === null">
                    <div class="metric-value" style="font-size: 18px; color: var(--dim);">N/A (Desktop)</div>
                </template>
            </div>
        </div>

        <!-- Acciones rápidas -->
        <div class="actions">
            <button class="btn primary" @click="quickOptimize()" :disabled="loading">
                ⚡ Optimización Rápida
            </button>
            <button class="btn" @click="scanAll()" :disabled="loading">
                🔍 Escanear Sistema
            </button>
            <button class="btn" @click="fixAll(true)" :disabled="loading">
                👁 Preview Fix
            </button>
            <button class="btn" @click="fixAll(false)" :disabled="loading">
                🔧 Aplicar Fixes
            </button>
        </div>

        <!-- Gráfica CPU en tiempo real -->
        <div class="section-title">CPU en Tiempo Real</div>
        <div class="card">
            <div class="chart-container">
                <canvas id="cpuChart"></canvas>
            </div>
        </div>

        <!-- Gráfica RAM en tiempo real -->
        <div class="section-title">RAM en Tiempo Real</div>
        <div class="card">
            <div class="chart-container">
                <canvas id="ramChart"></canvas>
            </div>
        </div>

        <!-- Resultados del escaneo -->
        <template x-if="scanResults">
            <div>
                <div class="section-title">Resultados del Escaneo</div>
                <div class="modules-grid">
                    <template x-for="(result, name) in scanResults" :key="name">
                        <div class="module-card">
                            <div class="module-status">
                                <span class="status-dot" :class="result.status === 'ok' ? 'dot-green' : result.status === 'warning' ? 'dot-yellow' : 'dot-red'"></span>
                                <h4 x-text="name.toUpperCase()"></h4>
                            </div>
                            <div class="metric-sub" x-text="result.summary"></div>
                            <template x-for="issue in (result.issues || []).slice(0, 5)" :key="issue.description">
                                <div class="issue" x-text="issue.description"></div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Log de acciones -->
        <div class="section-title">Log de Actividad</div>
        <div class="log">
            <template x-if="logs.length === 0">
                <div class="log-entry">Sin actividad reciente.</div>
            </template>
            <template x-for="log in logs" :key="log.time">
                <div class="log-entry" :class="log.type" x-text="`[${log.time}] ${log.message}`"></div>
            </template>
        </div>
    </div>

    <!-- Toast -->
    <template x-if="toast">
        <div class="toast" x-text="toast" x-init="setTimeout(() => toast = '', 3000)"></div>
    </template>

    <script>
    function dashboard() {
        return {
            score: '--',
            scoreColor: '#00d4ff',
            wsConnected: false,
            loading: false,
            toast: '',
            scanResults: null,
            logs: [],
            cpuChart: null,
            ramChart: null,
            cpuData: [],
            ramData: [],
            labels: [],
            metrics: {
                cpu: { percent: 0, per_core: [] },
                ram: { percent: 0, used_gb: 0, total_gb: 0 },
                ssd: { percent: 0, free_gb: 0, total_gb: 0 },
                battery: { percent: null, plugged: null },
                network: { sent_mb: 0, recv_mb: 0 },
            },

            init() {
                this.connectWebSocket();
                this.$nextTick(() => {
                    this.initCharts();
                });
            },

            connectWebSocket() {
                const ws = new WebSocket(`ws://${window.location.host}/ws/metrics`);
                ws.onopen = () => { this.wsConnected = true; };
                ws.onclose = () => {
                    this.wsConnected = false;
                    setTimeout(() => this.connectWebSocket(), 3000);
                };
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    this.metrics = data;
                    this.score = Math.round(data.score || 0);
                    this.scoreColor = this.score >= 80 ? '#00e676' : this.score >= 60 ? '#ffab00' : '#ff5252';
                    this.updateCharts(data);
                };
            },

            initCharts() {
                const chartOpts = {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 300 },
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#1a1a2e' }, ticks: { color: '#666' } },
                        x: { display: false },
                    },
                    plugins: { legend: { display: false } },
                    elements: { point: { radius: 0 }, line: { tension: 0.4 } },
                };

                this.cpuChart = new Chart(document.getElementById('cpuChart'), {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            data: [],
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            fill: true,
                            borderWidth: 2,
                        }],
                    },
                    options: chartOpts,
                });

                this.ramChart = new Chart(document.getElementById('ramChart'), {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            data: [],
                            borderColor: '#00e676',
                            backgroundColor: 'rgba(0, 230, 118, 0.1)',
                            fill: true,
                            borderWidth: 2,
                        }],
                    },
                    options: chartOpts,
                });
            },

            updateCharts(data) {
                const maxPoints = 60;
                const now = new Date().toLocaleTimeString();

                // CPU
                this.cpuChart.data.labels.push(now);
                this.cpuChart.data.datasets[0].data.push(data.cpu.percent);
                if (this.cpuChart.data.labels.length > maxPoints) {
                    this.cpuChart.data.labels.shift();
                    this.cpuChart.data.datasets[0].data.shift();
                }
                this.cpuChart.update('none');

                // RAM
                this.ramChart.data.labels.push(now);
                this.ramChart.data.datasets[0].data.push(data.ram.percent);
                if (this.ramChart.data.labels.length > maxPoints) {
                    this.ramChart.data.labels.shift();
                    this.ramChart.data.datasets[0].data.shift();
                }
                this.ramChart.update('none');
            },

            barClass(value) {
                if (value >= 80) return 'fill-red';
                if (value >= 60) return 'fill-yellow';
                return 'fill-green';
            },

            addLog(message, type = 'info') {
                const time = new Date().toLocaleTimeString();
                this.logs.unshift({ time, message, type });
                if (this.logs.length > 50) this.logs.pop();
            },

            async quickOptimize() {
                this.loading = true;
                this.addLog('Ejecutando optimización rápida...', 'info');
                try {
                    const res = await fetch('/api/quick', { method: 'POST' });
                    const data = await res.json();
                    for (const [name, result] of Object.entries(data)) {
                        this.addLog(`${name}: ${result.summary}`, 'success');
                    }
                    this.toast = '✓ Optimización rápida completada';
                } catch (e) {
                    this.addLog('Error en optimización rápida: ' + e.message, 'error');
                }
                this.loading = false;
            },

            async scanAll() {
                this.loading = true;
                this.addLog('Escaneando sistema...', 'info');
                try {
                    const res = await fetch('/api/scan');
                    const data = await res.json();
                    this.scanResults = data.results;
                    this.addLog(`Escaneo completado: ${data.total_issues} problemas (${data.total_fixable} corregibles)`, 'success');
                    this.toast = `Escaneo: ${data.total_issues} problemas encontrados`;
                } catch (e) {
                    this.addLog('Error en escaneo: ' + e.message, 'error');
                }
                this.loading = false;
            },

            async fixAll(preview = false) {
                this.loading = true;
                const mode = preview ? 'preview' : 'fix';
                this.addLog(`${preview ? 'Preview' : 'Aplicando'} fixes...`, 'info');
                try {
                    const res = await fetch(`/api/fix?preview=${preview}`, { method: 'POST' });
                    const data = await res.json();
                    for (const [name, result] of Object.entries(data)) {
                        this.addLog(`${name}: ${result.summary}`, result.status === 'ok' ? 'success' : 'error');
                    }
                    this.toast = preview ? 'Preview completado' : '✓ Fixes aplicados';
                } catch (e) {
                    this.addLog('Error: ' + e.message, 'error');
                }
                this.loading = false;
            },
        };
    }
    </script>
</body>
</html>
